<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaddieCast — Golf Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark: #1a3d0a; --green-mid: #27500A; --green-light: #EAF3DE; --green-border: #C0DD97;
      --blue-dark: #0C447C; --blue-light: #E6F1FB; --blue-border: #B5D4F4;
      --amber-dark: #633806; --amber-light: #FAEEDA; --amber-border: #FAC775;
      --red-dark: #791F1F; --red-light: #FCEBEB; --red-border: #F7C1C1;
      --bg: #f5f4f0; --card: #ffffff; --text: #1a1a1a;
      --text-secondary: #666; --text-tertiary: #999; --border: rgba(0,0,0,0.1);
      --radius: 16px; --radius-sm: 10px; --sidebar: 240px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Layout ── */
    .page { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar); flex-shrink: 0; background: var(--card);
      border-right: 1px solid var(--border); padding: 1.5rem 1rem;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
      display: flex; flex-direction: column; gap: 0;
    }
    .sidebar-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 1.5rem; }
    .sidebar-logo span { color: var(--green-mid); }
    .sidebar-section-label {
      font-size: 10px; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    }
    .fav-list { display: flex; flex-direction: column; gap: 4px; }
    .fav-item { display: flex; align-items: center; gap: 4px; }
    .fav-name {
      flex: 1; background: none; border: none; text-align: left; padding: 7px 8px;
      border-radius: var(--radius-sm); font-size: 13px; font-family: 'DM Sans', sans-serif;
      color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fav-name:hover { background: var(--green-light); color: var(--green-mid); }
    .fav-remove {
      background: none; border: none; color: var(--text-tertiary); cursor: pointer;
      font-size: 16px; padding: 4px 6px; border-radius: 6px; line-height: 1;
      font-family: 'DM Sans', sans-serif; flex-shrink: 0;
    }
    .fav-remove:hover { background: var(--red-light); color: var(--red-dark); }
    .fav-empty { font-size: 12px; color: var(--text-tertiary); line-height: 1.6; padding: 4px 0; }

    /* ── Main column ── */
    .main-col { flex: 1; min-width: 0; padding: 0 0 3rem; }
    .header { text-align: center; padding: 2rem 1rem 1.25rem; }
    .header-logo { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--text); letter-spacing: -0.5px; }
    .header-logo span { color: var(--green-mid); }
    .tagline { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

    /* ── Search ── */
    .search-wrap { max-width: 480px; margin: 0 auto 0.5rem; padding: 0 1rem; }
    .search-row { display: flex; gap: 8px; }
    .search-row input {
      flex: 1; padding: 13px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); font-size: 15px; font-family: 'DM Sans', sans-serif;
      background: var(--card); color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: var(--green-mid); }
    .search-row button {
      padding: 13px 20px; border-radius: var(--radius-sm); border: none;
      background: var(--green-mid); color: #fff; font-size: 15px; font-weight: 600;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.2s;
    }
    .search-row button:hover { background: var(--green-dark); }
    .search-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; text-align: center; }

    /* ── Mobile favorites ── */
    .fav-mobile {
      max-width: 480px; margin: 0.75rem auto 0; padding: 0 1rem;
      display: none;
    }
    .fav-mobile .fav-list { flex-direction: row; flex-wrap: wrap; gap: 6px; }
    .fav-mobile .fav-item { background: var(--card); border: 1px solid var(--border); border-radius: 999px; display: flex; align-items: center; }
    .fav-mobile .fav-name { padding: 5px 4px 5px 10px; font-size: 12px; white-space: nowrap; }
    .fav-mobile .fav-remove { padding: 4px 8px 4px 2px; font-size: 14px; }
    .fav-mobile-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }

    /* ── Quick picks ── */
    .quick-picks { max-width: 480px; margin: 1rem auto 0; padding: 0 1rem; }
    .quick-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .quick-btn {
      padding: 10px 14px; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; font-family: 'DM Sans', sans-serif;
      color: var(--text); cursor: pointer; text-align: left; transition: border-color 0.2s, background 0.2s;
    }
    .quick-btn:hover { border-color: var(--green-mid); background: var(--green-light); }
    .quick-btn .flag { margin-right: 6px; }

    /* ── Main content ── */
    .main { max-width: 480px; margin: 1.25rem auto 0; padding: 0 1rem; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); font-size: 15px; }
    .loading-dots::after { content: ''; animation: dots 1.2s steps(3, end) infinite; }
    @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

    /* ── Error ── */
    .error-box { background: var(--red-light); border: 1px solid var(--red-border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 14px; color: var(--red-dark); line-height: 1.6; }
    .inline-error { background: var(--amber-light); border: 1px solid var(--amber-border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: var(--amber-dark); line-height: 1.5; }
    .inline-error p { margin-bottom: 8px; font-weight: 500; }
    .suggestion-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .chip { background: white; border: 1px solid var(--amber-border); border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 500; color: var(--amber-dark); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
    .chip:hover { background: var(--green-light); border-color: var(--green-border); color: var(--green-mid); }

    /* ── Location ── */
    .location-line { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; margin-bottom: 1rem; }

    /* ── Grade card ── */
    .grade-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem 1.5rem 1.5rem; text-align: center; margin-bottom: 1rem; }
    .grade-circle { width: 108px; height: 108px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-family: 'DM Serif Display', serif; font-size: 44px; }
    .grade-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .grade-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem; }
    .heart-btn {
      display: inline-flex; align-items: center; gap: 6px; background: none;
      border: 1px solid var(--border); border-radius: 999px; padding: 7px 16px;
      font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
    }
    .heart-btn:hover { border-color: #e24b4a; color: #e24b4a; background: var(--red-light); }

    /* ── Section label ── */
    .section-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

    /* ── Factors ── */
    .factors { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .factor { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
    .factor-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .factor-name { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
    .pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; }
    .pill-g { background: var(--green-light); color: var(--green-mid); }
    .pill-w { background: var(--amber-light); color: var(--amber-dark); }
    .pill-b { background: var(--red-light); color: var(--red-dark); }
    .factor-val { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .factor-bar { height: 4px; background: #e8e8e4; border-radius: 2px; }
    .factor-fill { height: 4px; border-radius: 2px; }

    /* ── Banner ── */
    .banner { background: var(--amber-light); border: 1px solid var(--amber-border); border-radius: var(--radius-sm); padding: 10px 14px; display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
    .banner p { font-size: 12px; color: var(--amber-dark); line-height: 1.5; flex: 1; }
    .banner button { background: none; border: none; font-size: 12px; font-weight: 600; color: var(--amber-dark); cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; padding: 0; }

    /* ── Strip ── */
    .scroll-outer { overflow-x: auto; scrollbar-width: none; margin-bottom: 1.5rem; padding-bottom: 4px; }
    .scroll-outer::-webkit-scrollbar { display: none; }
    .strip { display: flex; gap: 8px; width: max-content; }
    .day-card { width: 66px; flex-shrink: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; }
    .day-card.today { background: var(--green-light); border-color: var(--green-border); }
    .day-name { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
    .day-date { font-size: 10px; color: var(--text-tertiary); margin-bottom: 6px; }
    .day-grade { font-size: 16px; font-weight: 600; }
    .day-est { font-size: 9px; color: var(--text-tertiary); margin-top: 3px; }
    .wk-divider { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 2px; min-height: 95px; }
    .wk-line { width: 1px; flex: 1; background: var(--border); }
    .wk-text { font-size: 9px; color: var(--text-tertiary); writing-mode: vertical-rl; transform: rotate(180deg); padding: 3px 0; letter-spacing: 0.3px; }

    /* ── Footer ── */
    .footer { text-align: center; margin-top: 2rem; font-size: 12px; color: var(--text-tertiary); }
    .footer a { color: var(--green-mid); text-decoration: none; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .fav-mobile { display: block; }
      .header-logo { font-size: 26px; }
    }

    /* ── Hourly strip ── */
    .hr-strip { display: flex; gap: 8px; width: max-content; padding-bottom: 4px; }
    .hr-card {
      width: 58px; flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 4px; text-align: center;
      cursor: default; transition: opacity 0.2s;
    }
    .hr-card.hr-past { opacity: 0.35; }
    .hr-time { font-size: 10px; color: var(--text-tertiary); margin-bottom: 5px; }
    .hr-grade {
      font-size: 13px; font-weight: 600; padding: 3px 4px; border-radius: 6px;
      border: 1px solid; margin-bottom: 5px; display: block;
    }
    .hr-temp { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .hr-rain { font-size: 11px; margin-bottom: 2px; }
    .hr-wind { font-size: 10px; color: var(--text-tertiary); }

    /* ── Best window ── */
    .best-window {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
    }
    .bw-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
    .bw-time { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
    .bw-grade { font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }

    /* ── Day strip selected state ── */
    .day-card { cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
    .day-card:hover { border-color: var(--green-border); transform: translateY(-1px); }
    .day-card.selected { border-color: var(--green-mid); border-width: 2px; background: var(--green-light); }
    .day-card.selected .day-grade { color: var(--green-mid) !important; }

  </style>
</head>
<body>
<div class="page">

  <!-- Sidebar (desktop) -->
  <aside class="sidebar">
    <div class="sidebar-logo">caddie<span>cast</span></div>
    <div class="sidebar-section-label">My Favorites</div>
    <div id="fav-sidebar"><div class="fav-list"></div></div>
  </aside>

  <!-- Main column -->
  <div class="main-col">
    <div class="header">
      <div class="header-logo">caddie<span>cast</span></div>
      <div class="tagline">Is it a golf day? Let's find out.</div>
    </div>

    <div class="search-wrap">
      <div class="search-row">
        <input id="city-input" type="text" placeholder="City, course, or zip..." autocomplete="off" />
        <button onclick="searchCity()">Check it</button>
      </div>
      <div class="search-hint">Try "Scottsdale", "Pebble Beach", "Valley Club of Montecito"</div>
      <div id="inline-error" style="display:none;margin-top:10px;"></div>
    </div>

    <!-- Mobile favorites -->
    <div class="fav-mobile" id="fav-mobile">
      <div class="fav-mobile-label">My Favorites</div>
      <div class="fav-list"></div>
    </div>

    <div class="quick-picks" id="quick-picks">
      <div class="quick-label">Popular courses</div>
      <div class="quick-grid">
        <button class="quick-btn" onclick="loadQuick('Scottsdale')"><span class="flag">🌵</span>Scottsdale, AZ</button>
        <button class="quick-btn" onclick="loadQuick('Monterey')"><span class="flag">🌊</span>Monterey, CA</button>
        <button class="quick-btn" onclick="loadQuick('St Andrews')"><span class="flag">🏴󠁧󠁢󠁳󠁣󠁴󠁿</span>St Andrews</button>
        <button class="quick-btn" onclick="loadQuick('Augusta')"><span class="flag">🍑</span>Augusta, GA</button>
        <button class="quick-btn" onclick="loadQuick('Pinehurst')"><span class="flag">⛳</span>Pinehurst, NC</button>
        <button class="quick-btn" onclick="loadQuick('Maui')"><span class="flag">🌺</span>Maui, HI</button>
      </div>
    </div>

    <div class="main" id="main-content"></div>

    <div class="footer">
      Weather data from <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Free &amp; open source
    </div>
  </div>
</div>

<script>


const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// ── Scoring ───────────────────────────────────────────────
function windScore(v)  { if(v<=5)return 25; if(v<=10)return 23; if(v<=15)return 19; if(v<=20)return 14; if(v<=25)return 8; if(v<=35)return 3; return 0; }
function rainScore(v)  { if(v<=10)return 25; if(v<=20)return 21; if(v<=35)return 15; if(v<=50)return 8; if(v<=70)return 3; return 0; }
function tempScore(v)  { if(v>=62&&v<=82)return 25; if(v>=55&&v<=90)return 21; if(v>=45&&v<=95)return 15; if(v>=38&&v<=100)return 8; return 2; }
function humidScore(v) { if(v<=45)return 25; if(v<=60)return 21; if(v<=72)return 15; if(v<=85)return 8; return 3; }
function hourScore(wind, rain, temp, humid) { return windScore(wind) + rainScore(rain) + tempScore(temp) + humidScore(humid); }

function gradeFromScore(s) {
  if (s >= 93) return "A+"; if (s >= 87) return "A"; if (s >= 83) return "A-";
  if (s >= 80) return "B+"; if (s >= 75) return "B"; if (s >= 70) return "B-";
  if (s >= 67) return "C+"; if (s >= 63) return "C"; if (s >= 60) return "C-";
  if (s >= 55) return "D+"; if (s >= 50) return "D"; return "F";
}
function gradeColor(g) {
  const c = g[0];
  if (c === "A") return { text: "#1a3d0a", bg: "#EAF3DE", border: "#C0DD97" };
  if (c === "B") return { text: "#0C447C", bg: "#E6F1FB", border: "#B5D4F4" };
  if (c === "C") return { text: "#633806", bg: "#FAEEDA", border: "#FAC775" };
  return { text: "#791F1F", bg: "#FCEBEB", border: "#F7C1C1" };
}
function factorLabel(type, val) {
  if (type==="wind")  { if(val<=8)return["Low","g"]; if(val<=18)return["Breezy","w"]; return["Strong","b"]; }
  if (type==="rain")  { if(val<=15)return["None","g"]; if(val<=40)return["Possible","w"]; return["Likely","b"]; }
  if (type==="temp")  { if(val>=62&&val<=82)return["Perfect","g"]; if(val>=50&&val<=92)return["Ok","w"]; return["Rough","b"]; }
  if (type==="humid") { if(val<=50)return["Comfortable","g"]; if(val<=72)return["Moderate","w"]; return["Muggy","b"]; }
}
function barFill(cls) { return cls==="g"?"#639922":cls==="w"?"#EF9F27":"#E24B4A"; }
function gradeTitle(g) {
  const c = g[0];
  if (c==="A") return "Great day to play";
  if (c==="B") return "Good enough to play";
  if (c==="C") return "Marginal — your call";
  return "Skip it today";
}

// Best 4-hour window score
function bestWindow(hours) {
  // hours is array of {hour, score, grade, wind, rain, temp, humid}
  // Only consider 6am-7pm (hours 6-19)
  const playable = hours.filter(h => h.hour >= 6 && h.hour <= 19);
  if (!playable.length) return null;
  let best = null, bestScore = -1;
  for (let i = 0; i <= playable.length - 4; i++) {
    const window = playable.slice(i, i + 4);
    const avg = window.reduce((s, h) => s + h.score, 0) / 4;
    if (avg > bestScore) { bestScore = avg; best = window; }
  }
  if (!best) best = [playable[0]];
  const startHour = best[0].hour;
  const endHour = best[best.length-1].hour + 1;
  const fmt = h => { const ampm = h >= 12 ? 'pm' : 'am'; return (h > 12 ? h-12 : h || 12) + ampm; };
  return { label: `${fmt(startHour)}–${fmt(endHour)}`, score: Math.round(bestScore), grade: gradeFromScore(Math.round(bestScore)) };
}


// ── Course detection ──────────────────────────────────────
function looksLikeCourse(q) {
  const lower = q.toLowerCase();
  const words = ["club","course","golf","links","national","country","pines","dunes","ridge","valley","hills","bay","harbor","harbour","creek","meadow","woods","forest","resort","beach","manor","estate","springs","ranch","farm","island","point","cove","bluff","highlands","plantation","preserve","oaks","glen","knoll","moor","hollow","fields","crossing","run","trace","shores","crest","summit","lakes","park"];
  return words.some(w => lower.includes(w));
}

const COURSE_DB = {

  "kapalua":{ name:"Kapalua Plantation Course", city:"Lahaina", state:"HI" },

  "merion":{ name:"Merion Golf Club", city:"Ardmore", state:"PA" },
  "southern hills":{ name:"Southern Hills Country Club", city:"Tulsa", state:"OK" },
  "colonial country club":{ name:"Colonial Country Club", city:"Fort Worth", state:"TX" },
  "medinah":{ name:"Medinah Country Club", city:"Medinah", state:"IL" },
  "hazeltine":{ name:"Hazeltine National Golf Club", city:"Chaska", state:"MN" },

function lookupCourse(raw) {
  const lower = raw.toLowerCase().trim();
  for (const [key, val] of Object.entries(COURSE_DB)) {
    if (lower === key || lower.includes(key) || key.includes(lower)) return [val];
  }
  const words = lower.split(/\s+/).filter(w => w.length > 3);
  const matches = [];
  const seen = new Set();
  for (const [key, val] of Object.entries(COURSE_DB)) {
    const score = words.filter(w => key.includes(w)).length;
    if (score >= 1 && !seen.has(val.name)) { matches.push({...val, score}); seen.add(val.name); }
  }
  return matches.sort((a,b) => b.score - a.score).slice(0, 4);
}

function cleanCityQuery(raw) {
  const abbr = raw.match(/^(.+),\s*([A-Z]{2})$/);
  if (abbr) return abbr[1].trim();
  return raw.replace(/,/g, " ").replace(/\s+/g, " ").trim();
}

async function geocode(raw) {
  const q = cleanCityQuery(raw);
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=en&format=json`);
  const d = await r.json();
  if (!d.results || !d.results.length) throw new Error("Location not found. Try just the city name.");
  return d.results[0];
}

// ── Fetch ─────────────────────────────────────────────────
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&hourly=temperature_2m,precipitation_probability,windspeed_10m,relativehumidity_2m`
    + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max`
    + `&temperature_unit=fahrenheit&windspeed_unit=mph&forecast_days=16&timezone=auto`;
  const r = await fetch(url);
  const data = await r.json();
  if (data.error) throw new Error("Weather data unavailable: " + (data.reason || "unknown error"));
  if (!data.daily) throw new Error("No weather data returned for this location.");
  return data;
}

// ── Process ───────────────────────────────────────────────
function processWeather(data) {
  const h = data.hourly;
  const d = data.daily;

  // Build hourly array
  const allHours = h.time.map((t, i) => {
    const dt = new Date(t);
    return {
      datetime: t,
      date: t.split('T')[0],
      hour: dt.getHours(),
      temp: h.temperature_2m[i] || 60,
      rain: h.precipitation_probability[i] || 0,
      wind: h.windspeed_10m[i] || 0,
      humid: h.relativehumidity_2m[i] || 50,
      score: hourScore(h.windspeed_10m[i]||0, h.precipitation_probability[i]||0, h.temperature_2m[i]||60, h.relativehumidity_2m[i]||50),
    };
  }).map(h => ({ ...h, grade: gradeFromScore(h.score) }));

  // Group by day
  const days = d.time.map((date, i) => {
    const dayHours = allHours.filter(h => h.date === date);
    // Use best 4-hour window for headline grade (6am-7pm only)
    const playableHours = dayHours.filter(h => h.hour >= 6 && h.hour <= 19);
    const avgScore = playableHours.length
      ? Math.round(playableHours.reduce((s,h) => s + h.score, 0) / playableHours.length)
      : Math.round((windScore(d.windspeed_10m_max[i]||0) + rainScore(d.precipitation_probability_max[i]||0) + tempScore((d.temperature_2m_max[i]+d.temperature_2m_min[i])/2) + humidScore(50)));
    const window = bestWindow(dayHours);
    return {
      date,
      temp: (d.temperature_2m_max[i] + d.temperature_2m_min[i]) / 2,
      wind: d.windspeed_10m_max[i] || 0,
      rain: d.precipitation_probability_max[i] || 0,
      humid: playableHours.length ? Math.round(playableHours.reduce((s,h) => s+h.humid,0)/playableHours.length) : 50,
      score: avgScore,
      grade: gradeFromScore(avgScore),
      hours: dayHours,
      bestWindow: window,
    };
  });
  return days;
}

function fmtHour(h) { return h === 0 ? '12am' : h === 12 ? '12pm' : h > 12 ? `${h-12}pm` : `${h}am`; }

function renderHourlyStrip(dayIdx) {
  const day = _days[dayIdx];
  if (!day) return;
  const hours = day.hours.filter(h => h.hour >= 6 && h.hour <= 20);
  const now = new Date();
  const isToday = dayIdx === 0;

  const stripHTML = hours.map(h => {
    const gc = gradeColor(h.grade);
    const isPast = isToday && h.hour < now.getHours();
    return `<div class="hr-card ${isPast ? 'hr-past' : ''}">
      <div class="hr-time">${fmtHour(h.hour)}</div>
      <div class="hr-grade" style="color:${gc.text};background:${gc.bg};border-color:${gc.border}">${h.grade}</div>
      <div class="hr-temp">${Math.round(h.temp)}°</div>
      <div class="hr-rain" style="color:${h.rain>40?'#A32D2D':h.rain>20?'#854F0B':'#999'}">${Math.round(h.rain)}%</div>
      <div class="hr-wind">${Math.round(h.wind)}mph</div>
    </div>`;
  }).join('');

  const win = day.bestWindow;
  const winHtml = win ? `<div class="best-window">
    <span class="bw-label">Best window</span>
    <span class="bw-time">${win.label}</span>
    <span class="bw-grade" style="color:${gradeColor(win.grade).text};background:${gradeColor(win.grade).bg}">${win.grade}</span>
  </div>` : '';

  document.getElementById('hourly-section').innerHTML = `
    ${winHtml}
    <div class="scroll-outer"><div class="hr-strip">${stripHTML}</div></div>
  `;
}

function renderDayStrip() {
  let html = '';
  let lastWeek = 0;
  for (let i = 0; i < _days.length; i++) {
    const day = _days[i];
    const d = new Date(day.date + 'T12:00:00');
    const weekNum = Math.floor(i / 7);
    const isFarOut = i >= 7;
    const gc = gradeColor(day.grade);
    const opacity = isFarOut ? Math.max(0.38, 1 - (i-7)*0.04) : 1;
    const isSelected = i === _selectedDay;
    if (weekNum !== lastWeek) {
      html += `<div class="wk-divider"><div class="wk-line"></div><span class="wk-text">Wk ${weekNum+1}</span><div class="wk-line"></div></div>`;
      lastWeek = weekNum;
    }
    html += `<div class="day-card ${i===0?'today':''} ${isSelected?'selected':''}" style="opacity:${opacity}" onclick="selectDay(${i})">
      <div class="day-name">${DAYS[d.getDay()]}</div>
      <div class="day-date">${MONTHS[d.getMonth()]} ${d.getDate()}</div>
      <div class="day-grade" style="color:${gc.text}">${day.grade}</div>
      ${isFarOut ? '<div class="day-est">est.</div>' : ''}
    </div>`;
  }
  document.getElementById('day-strip').innerHTML = html;
}

function gradeDesc(g, wind, rain, temp) {
  const c = g[0];
  if (c==="A") return `Clear skies, light wind, and ${Math.round(temp)}°F. Get out there.`;
  if (c==="B") {
    if (wind > 15) return `Playable but breezy at ${Math.round(wind)} mph. Factor in the wind.`;
    if (rain > 30) return `Some rain possible. Check back closer to tee time.`;
    return `Decent conditions. A solid round is on the cards.`;
  }
  if (c==="C") return `Marginal day. Playable if you don't mind grinding it out.`;
  return `Not ideal. Check the hourly below for a better window today.`;
}

// ── Favorites (localStorage) ──────────────────────────────
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('cc_favorites') || '[]'); }
  catch { return []; }
}
function saveFavorites(favs) {
  localStorage.setItem('cc_favorites', JSON.stringify(favs));
}
function isFavorite(query) {
  return getFavorites().some(f => f.query === query);
}
function toggleFavorite(query, label) {
  let favs = getFavorites();
  if (isFavorite(query)) {
    favs = favs.filter(f => f.query !== query);
  } else {
    // Store both the geocodable city query and the display label
    // _lastCity is set by renderApp so we know what city was actually resolved
    const cityQuery = window._lastResolvedCity || query;
    favs.unshift({ query, label, cityQuery });
    if (favs.length > 20) favs = favs.slice(0, 20);
  }
  saveFavorites(favs);
  renderFavorites();
  updateHeartBtn(query);
}
function renderFavorites() {
  const favs = getFavorites();
  const emptyMsg = '<div class="fav-empty">No favorites yet. Search a course and tap the heart to save it.</div>';
  const itemsHtml = favs.length === 0 ? emptyMsg : favs.map(f => {
    const q = f.query.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const l = f.label.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="fav-item">
      <button class="fav-name" onclick="loadFav('${q}','${l}')">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M6 11C6 11 2 7.5 2 5a4 4 0 018 0c0 2.5-4 6-4 6z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
        ${f.label}
      </button>
      <button class="fav-remove" onclick="removeFav('${q}')">×</button>
    </div>`;
  }).join('');
  const sidebar = document.getElementById('fav-sidebar');
  const mobile = document.getElementById('fav-mobile');
  if (sidebar) sidebar.querySelector('.fav-list').innerHTML = itemsHtml;
  if (mobile) {
    mobile.querySelector('.fav-list').innerHTML = itemsHtml;
    mobile.style.display = favs.length > 0 ? 'block' : 'none';
  }
}
function removeFav(query) {
  let favs = getFavorites().filter(f => f.query !== query);
  saveFavorites(favs);
  renderFavorites();
  updateHeartBtn(query);
}
function loadFav(query, label) {
  document.getElementById('city-input').value = label;
  // Use resolved city if stored, fallback to query
  const favItem = getFavorites().find(f => f.query === query || f.label === label);
  runCity(favItem ? (favItem.cityQuery || query) : query, label);
}
// Direct city run - skips course detection entirely
async function runCity(cityQuery, displayName) {
  const mc = document.getElementById('main-content');
  const inlineErr = document.getElementById('inline-error');
  inlineErr.style.display = 'none';
  inlineErr.innerHTML = '';
  document.getElementById('quick-picks').style.display = 'none';
  mc.innerHTML = '<div class="loading">Fetching forecast<span class="loading-dots"></span></div>';
  try {
    const loc = await geocode(cityQuery);
    const weather = await fetchWeather(loc.latitude, loc.longitude);
    const days = processWeather(weather);
    const name = displayName || (loc.name + (loc.admin1 ? ', ' + loc.admin1 : ''));
    mc.innerHTML = '';
    window._lastResolvedCity = loc.name + (loc.admin1 ? ', ' + loc.admin1 : '');
    renderApp(name, days, cityQuery);
  } catch(e) {
    mc.innerHTML = '';
    document.getElementById('quick-picks').style.display = 'block';
    inlineErr.style.display = 'block';
    inlineErr.innerHTML = '<div class="inline-error"><p>Couldn\'t load that location. Try searching again.</p></div>';
  }
}
function updateHeartBtn(query) {
  const btn = document.getElementById('heart-btn');
  if (!btn) return;
  const saved = isFavorite(query);
  btn.innerHTML = saved
    ? `<svg width="16" height="16" viewBox="0 0 16 16" fill="#e24b4a"><path d="M8 14s-6-3.75-6-8a4 4 0 018 0 4 4 0 018 0c0 4.25-6 8-6 8z"/></svg> Saved`
    : `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 14s-6-3.75-6-8a4 4 0 018 0 4 4 0 018 0c0 4.25-6 8-6 8z"/></svg> Save`;
  btn.style.color = saved ? '#e24b4a' : '';
  btn.dataset.query = query;
  btn.dataset.label = document.getElementById('city-input').value || query;
}

async function run(query, displayName, cityOverride) {
  const mc = document.getElementById("main-content");
  const inlineErr = document.getElementById("inline-error");
  inlineErr.style.display = "none";
  inlineErr.innerHTML = "";
  document.getElementById("quick-picks").style.display = "none";

  // If it looks like a course, check our course database
  if (!cityOverride && looksLikeCourse(query)) {
    const matches = lookupCourse(query);
    if (matches.length === 1) {
      const course = matches[0];
      const label = course.name + " — " + course.city + ", " + course.state;
      return run(course.city, label, true);
    } else if (matches.length > 1) {
      mc.innerHTML = "";
      document.getElementById("quick-picks").style.display = "block";
      inlineErr.style.display = "block";
      const chips = matches.map(c => {
        const label = c.name + " — " + c.city + ", " + c.state;
        const safe = label.replace(/'/g, "\'");
        return `<button class="chip" onclick="run('${c.city}', '${safe}', true)">${c.name} <span style="opacity:0.6;font-size:11px">${c.city}, ${c.state}</span></button>`;
      }).join("");
      inlineErr.innerHTML = `<div class="inline-error" style="background:var(--blue-light);border-color:var(--blue-border);color:var(--blue-dark)">
        <p style="color:var(--blue-dark)">Found a few matches — which one?</p>
        <div class="suggestion-chips">${chips}</div>
      </div>`;
      inlineErr.style.display = "block";
      return;
    }
  }

  mc.innerHTML = `<div class="loading">Fetching forecast<span class="loading-dots"></span></div>`;
  try {
    const loc = await geocode(query);
    const weather = await fetchWeather(loc.latitude, loc.longitude);
    const days = processWeather(weather);
    const name = displayName || (loc.name + (loc.admin1 ? ", " + loc.admin1 : ""));
    mc.innerHTML = "";
    window._lastResolvedCity = loc.name + (loc.admin1 ? ", " + loc.admin1 : "");
    renderApp(name, days, query);
  } catch(e) {
    mc.innerHTML = "";
    document.getElementById("quick-picks").style.display = "block";
    const suggestions = ["Scottsdale", "Chicago", "Monterey", "St Andrews", "Augusta", "Pinehurst"];
    const chips = suggestions.map(s => `<button class="chip" onclick="loadQuick('${s}')">${s}</button>`).join("");
    inlineErr.style.display = "block";
    const errMsg = e.message && e.message.length < 120 ? e.message : "Couldn't load weather for that location.";
    inlineErr.innerHTML = `<div class="inline-error">
      <p>${errMsg} Try one of these:</p>
      <div class="suggestion-chips">${chips}</div>
    </div>`;
  }
}

function searchCity() {
  const val = document.getElementById("city-input").value.trim();
  if (!val) return;
  run(val, null);
}

function loadQuick(q) {
  document.getElementById("city-input").value = q;
  run(q, null);
}

document.getElementById("city-input").addEventListener("keydown", e => {
  if (e.key === "Enter") searchCity();
});

// Init
renderFavorites();


</script>
</body>
